<!--
  Main HTML Entry Point for PRD Helper

  This file is the root of the React single-page application. It contains the
  <div id="root"> where the entire application is mounted.

  Key Behaviors:
  - Sets the base title, meta tags for SEO, and social media sharing cards.
  - Includes a JSON-LD script for structured data to enhance search engine results.
  - Links favicons and other essential assets.

  Recent Changes:
  - [2025-10-30] Added comprehensive SEO meta tags, social cards, and JSON-LD structured data.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy - Allow Google APIs for OAuth -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.sentry.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" />
    <title>Clearly - AI-Powered Requirements Documents</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Clearly is an AI-powered platform that helps you generate Business Requirements Documents (BRDs) and Product Requirements Documents (PRDs) from your initial ideas." />
    <meta name="keywords" content="AI, requirements documents, BRD, PRD, product management, software development, project planning" />
    <meta name="author" content="Clearly" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clearly-711582759542.us-west1.run.app/" />
    <meta property="og:title" content="Clearly - AI-Powered Requirements Documents" />
    <meta property="og:description" content="Transform your ideas into detailed, structured requirements documents with the power of AI. Get started with Clearly." />
    <meta property="og:image" content="https://clearly-711582759542.us-west1.run.app/images/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://clearly-711582759542.us-west1.run.app/" />
    <meta property="twitter:title" content="Clearly - AI-Powered Requirements Documents" />
    <meta property="twitter:description" content="Transform your ideas into detailed, structured requirements documents with the power of AI. Get started with Clearly." />
    <meta property="twitter:image" content="https://clearly-711582759542.us-west1.run.app/images/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Clearly",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web",
      "description": "An AI-powered platform for generating Business and Product Requirements Documents.",
      "url": "https://clearly-711582759542.us-west1.run.app/",
      "author": {
        "@type": "Organization",
        "name": "Clearly"
      },
      "offers": {
        "@type": "Offer",
        "price": "0" 
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
