# Cloud Build configuration for deploying to Cloud Run
# Project: clearly-478614
# Service: Clearly - Intelligent Requirements Platform
#
# Recent Changes:
# - [2025-11-26] Migrated to Firebase/Firestore - removed Prisma migrations step
# - [2025-11-26] Updated secrets for Firebase Authentication
# - [2025-11-26] Added Firebase client configuration build args

steps:
  # Step 1: Build the Docker image with Firebase configuration
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_SENTRY_DSN=$$VITE_SENTRY_DSN \
          --build-arg VITE_FIREBASE_API_KEY=$$VITE_FIREBASE_API_KEY \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN=$$VITE_FIREBASE_AUTH_DOMAIN \
          --build-arg VITE_FIREBASE_PROJECT_ID=$$VITE_FIREBASE_PROJECT_ID \
          --build-arg VITE_FIREBASE_STORAGE_BUCKET=$$VITE_FIREBASE_STORAGE_BUCKET \
          --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=$$VITE_FIREBASE_MESSAGING_SENDER_ID \
          --build-arg VITE_FIREBASE_APP_ID=$$VITE_FIREBASE_APP_ID \
          -t gcr.io/clearly-478614/clearly:$BUILD_ID \
          -t gcr.io/clearly-478614/clearly:latest \
          .
    secretEnv:
      - 'VITE_SENTRY_DSN'
      - 'VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN'
      - 'VITE_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_STORAGE_BUCKET'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID'
      - 'VITE_FIREBASE_APP_ID'
    id: 'build-image'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/clearly-478614/clearly:$BUILD_ID'
    id: 'push-image-sha'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/clearly-478614/clearly:latest'
    id: 'push-image-latest'

  # Step 3: Deploy to Cloud Run
  # Note: No database migrations needed with Firestore - schema is flexible
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clearly'
      - '--image'
      - 'gcr.io/clearly-478614/clearly:$BUILD_ID'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--service-account'
      - 'cloud-run-sa@clearly-478614.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'FIRESTORE_DATABASE_ID=clearly,FIREBASE_PROJECT_ID=clearly-478614,GOOGLE_CLOUD_PROJECT_ID=clearly-478614,CLIENT_URL=https://www.clearlyreqs.com,NODE_ENV=production'
      - '--update-secrets'
      - 'FIREBASE_ADMIN_SDK_KEY=firebase-admin-sdk-key:latest,OPENROUTER_API_KEY=openrouter-api-key:latest,GOOGLE_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_CLIENT_SECRET=google-oauth-client-secret:latest,GOOGLE_CALLBACK_URL=google-oauth-callback-url:latest,GMAIL_USER=gmail-user:latest,GMAIL_APP_PASSWORD=gmail-app-password:latest,SESSION_SECRET=SESSION_SECRET:latest'
    id: 'deploy-cloud-run'

# Store images in Google Container Registry
images:
  - 'gcr.io/clearly-478614/clearly:$BUILD_ID'
  - 'gcr.io/clearly-478614/clearly:latest'

# Build configuration
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON

# Build timeout (30 minutes)
timeout: 1800s

# Available secrets for build steps
availableSecrets:
  secretManager:
    # Frontend build-time secrets (Firebase client config - public values)
    - versionName: projects/clearly-478614/secrets/VITE_SENTRY_DSN/versions/latest
      env: 'VITE_SENTRY_DSN'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: 'VITE_FIREBASE_API_KEY'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: 'VITE_FIREBASE_AUTH_DOMAIN'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: 'VITE_FIREBASE_PROJECT_ID'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: 'VITE_FIREBASE_STORAGE_BUCKET'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: 'VITE_FIREBASE_MESSAGING_SENDER_ID'
    - versionName: projects/clearly-478614/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: 'VITE_FIREBASE_APP_ID'
